name: Update Events Daily

on:
  schedule:
    # Runs daily at 11:25 UTC (4:25 AM PDT / 3:25 AM PST) — off-peak to avoid Gemini 503s
    - cron: "25 11 * * *"
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: update-events-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-events:
    runs-on: ubuntu-latest
    env:
      VERCEL_CLI_VERSION: 51.7.0

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate events snapshot
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: npm run update-events

      - name: Validate published artifacts
        run: npm run validate

      - name: Commit updated artifacts
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/events.json public/search-index.json public/status.json
          if git diff --staged --quiet; then
            echo "No artifact changes to commit"
            exit 0
          fi

          git commit -m "Update events - $(date +'%Y-%m-%d')"
          git fetch origin "${GITHUB_REF_NAME}"
          git rebase "origin/${GITHUB_REF_NAME}"
          git push origin HEAD:"${GITHUB_REF_NAME}"

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npx --yes vercel@${VERCEL_CLI_VERSION} pull --yes --environment=production --token=$VERCEL_TOKEN
          npx --yes vercel@${VERCEL_CLI_VERSION} build --prod --token=$VERCEL_TOKEN
          npx --yes vercel@${VERCEL_CLI_VERSION} deploy --prebuilt --prod --token=$VERCEL_TOKEN
