name: Update Events Daily

on:
  schedule:
    # Runs daily at 11:25 UTC (4:25 AM PDT / 3:25 AM PST) — off-peak to avoid Gemini 503s
    - cron: "25 11 * * *"
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: update-events-main
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  update-events:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate events snapshot
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: npm run update-events

      - name: Validate published artifacts
        run: npm run validate

      - name: Create artifact update pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/update-events
          base: main
          delete-branch: true
          add-paths: |
            public/events.json
            public/search-index.json
            public/status.json
          commit-message: "Update events snapshot"
          title: "Update events snapshot"
          body: |
            ## Summary

            This PR was opened automatically by the daily events pipeline.

            Updated artifacts:

            - `public/events.json`
            - `public/search-index.json`
            - `public/status.json`

            ## Validation

            - `npm run update-events`
            - `npm run validate`

            Workflow run: `${{ github.run_id }}`
          author: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
          committer: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
