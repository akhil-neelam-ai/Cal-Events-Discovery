name: Update Events Daily

on:
  schedule:
    # GitHub cron is UTC-only, so run at both 11:00 and 12:00 UTC.
    # schedule-gate maps the triggering cron to the active Pacific offset
    # so delayed runs still execute on the intended local 4:00 AM schedule.
    #
    # Summer cadence (2026-06): Mon/Wed/Fri at 4:00 AM Pacific. Berkeley
    # event volume is low between terms. Revisit ~2026-08-17 (before fall
    # semester) and restore daily runs.
    - cron: "0 11 * * 1,3,5"
    - cron: "0 12 * * 1,3,5"
  workflow_dispatch:

concurrency:
  group: update-events-main
  cancel-in-progress: false

env:
  AUTOMATION_PR_TOKEN: ${{ secrets.AUTOMATION_PR_TOKEN }}

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  schedule-gate:
    if: ${{ github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
    steps:
      - name: Gate scheduled runs to 4:00 AM Pacific
        id: gate
        run: |
          trigger_cron='${{ github.event.schedule }}'
          pacific_offset="$(TZ=America/Los_Angeles date +%z)"
          should_run=false

          case "${pacific_offset}:${trigger_cron}" in
            -0700:"0 11 * * *"|\
            -0800:"0 12 * * *")
              should_run=true
              ;;
          esac

          echo "should_run=${should_run}" >> "$GITHUB_OUTPUT"

          if [ "$should_run" != "true" ]; then
            echo "Skipping scheduled run triggered by '${trigger_cron}' with Pacific offset ${pacific_offset}."
          fi

  update-events:
    needs: schedule-gate
    if: |
      always() && (
        github.event_name == 'workflow_dispatch' ||
        (needs.schedule-gate.result == 'success' && needs.schedule-gate.outputs.should_run == 'true')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Require automation token for scheduled runs
        if: ${{ github.event_name == 'schedule' && env.AUTOMATION_PR_TOKEN == '' }}
        run: |
          echo "::error::AUTOMATION_PR_TOKEN required for scheduled runs — see README"
          exit 1

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate events snapshot
        env:
          STRICT_DATA_QUALITY: "true"
          MAX_FALLBACK_AGE_HOURS: "48"
        run: |
          set -euo pipefail
          for attempt in 1 2; do
            if npm run update-events; then
              exit 0
            fi
            if [ "${attempt}" = "2" ]; then
              echo "::error::update-events failed after 2 attempts"
              exit 1
            fi
            echo "update-events failed (attempt ${attempt}), retrying in 120s..."
            sleep 120
          done

      - name: Check feed health
        env:
          BLOCK_ON_DEGRADED: "true"
          FEED_STALE_HOURS: "36"
          MAX_FALLBACK_AGE_HOURS: "48"
        run: npx tsx scripts/checkFeedHealth.ts

      - name: Validate published artifacts
        run: npm run validate

      - name: Create artifact update pull request
        id: create_pr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ env.AUTOMATION_PR_TOKEN || github.token }}
          branch: automation/update-events
          base: main
          delete-branch: true
          add-paths: |
            public/events.json
            public/search-index.json
            public/status.json
          commit-message: "Update events snapshot"
          title: "Update events snapshot"
          body: |
            ## Summary

            This PR was opened automatically by the daily events pipeline.

            Updated artifacts:

            - `public/events.json`
            - `public/search-index.json`
            - `public/status.json`

            ## Validation

            - `npm run update-events`
            - `npm run validate`

            Workflow run: `${{ github.run_id }}`
          author: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
          committer: github-actions[bot] <github-actions[bot]@users.noreply.github.com>

      - name: Warn if updater PR cannot complete automatically
        if: ${{ steps.create_pr.outputs.pull-request-number && env.AUTOMATION_PR_TOKEN == '' }}
        run: |
          echo "::warning::AUTOMATION_PR_TOKEN is not set."
          echo "::warning::The updater PR was created with GITHUB_TOKEN, so downstream pull_request workflows like browser-e2e will not run and auto-merge is skipped."

      - name: Wait for checks and merge artifact update PR
        if: ${{ steps.create_pr.outputs.pull-request-number && env.AUTOMATION_PR_TOKEN != '' }}
        run: |
          pr_number="${{ steps.create_pr.outputs.pull-request-number }}"

          for attempt in {1..30}; do
            if gh pr checks "${pr_number}" > /tmp/pr-checks.txt 2>&1; then
              if [ -s /tmp/pr-checks.txt ]; then
                cat /tmp/pr-checks.txt
                break
              fi
            else
              cat /tmp/pr-checks.txt || true
            fi

            if [ "${attempt}" = "30" ]; then
              echo "::error::No PR checks appeared for #${pr_number}; refusing to merge automatically."
              exit 1
            fi

            sleep 10
          done

          gh pr checks --watch --fail-fast "${pr_number}"
          gh pr merge --merge "${pr_number}"
        env:
          GH_TOKEN: ${{ env.AUTOMATION_PR_TOKEN }}

  notify-failure:
    needs: update-events
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Notify pipeline failure
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_NAME: Update Events Daily
          FAILURE_CONTEXT: update-events job
        run: node scripts/notifyPipelineFailure.mjs
